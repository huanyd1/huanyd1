name: Generate Snake

on:
  schedule:
    - cron: "0 */6 * * *"   # chạy mỗi 6 tiếng, khớp với github-stats.yml
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  generate-snake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          clean: false   # tránh checkout cố xoá file cũ trong workspace và dính EACCES
                          # nếu file đó từng bị ghi bởi container Docker chạy quyền root

      - name: Generate snake.svg
        uses: Platane/snk@v3
        with:
          github_user_name: huanyd1
          outputs: |
            assets/snake.svg?color_snake=#38bdf8&color_dots=#1e293b,#0e4429,#006d32,#26a641,#39d353

      - name: Trả lại quyền sở hữu cho runner user
        # Platane/snk chạy trong Docker container, container có thể ghi file
        # bằng quyền root -> cần chown lại trước khi git add/commit, và để
        # lần chạy sau checkout không gặp lại lỗi EACCES tương tự
        run: sudo chown -R $(id -u):$(id -g) assets/

      - name: Commit nếu có thay đổi
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/snake.svg
          git diff --staged --quiet || git commit -m "chore: auto-update snake.svg"
          git push