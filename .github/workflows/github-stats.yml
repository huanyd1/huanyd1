name: Update GitHub Stats

on:
  schedule:
    - cron: "0 */6 * * *"   # chạy mỗi 6 tiếng
  push:
    branches: [main]
  workflow_dispatch: {}      # cho phép bấm chạy tay trong tab Actions

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cài dependency
        run: pip install requests

      - name: Chạy generate_stats.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USERNAME: huanyd1
        run: python scripts/generate_stats.py

      - name: Commit nếu có thay đổi
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/github-stats.svg
          git diff --staged --quiet || git commit -m "chore: auto-update github-stats.svg"
          git push