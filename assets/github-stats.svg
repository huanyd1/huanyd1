    <rect x="60.0" y="260" width="488.2" height="34" fill="#178600"/><rect x="548.2" y="260" width="325.1" height="34" fill="#3178c6"/><rect x="873.2" y="260" width="133.9" height="34" fill="#e34c26"/><rect x="1007.2" y="260" width="86.4" height="34" fill="#3572A5"/><rect x="1093.6" y="260" width="46.4" height="34" fill="#c6538c"/>
  </g>

  
  <circle cx="60" cy="324" r="7" fill="#178600"/>
  <text x="78" y="330" fill="white" font-size="18"
